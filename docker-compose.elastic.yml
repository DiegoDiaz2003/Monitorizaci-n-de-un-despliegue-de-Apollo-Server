version: "3.8"

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:${ELASTIC_VERSION:-7.9.3}
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
      - xpack.security.enabled=false
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - esdata:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    networks:
      - observability

  kibana:
    image: docker.elastic.co/kibana/kibana:${ELASTIC_VERSION:-7.9.3}
    container_name: kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    depends_on:
      - elasticsearch
    ports:
      - "5601:5601"
    networks:
      - observability

  logstash:
    image: docker.elastic.co/logstash/logstash:${ELASTIC_VERSION:-7.9.3}
    container_name: logstash
    depends_on:
      - elasticsearch
    volumes:
      - ./elastic/logstash/pipeline:/usr/share/logstash/pipeline:ro
    ports:
      - "5044:5044"
      - "9600:9600"
    networks:
      - observability

  apm-server:
    image: docker.elastic.co/apm/apm-server:${ELASTIC_VERSION:-7.9.3}
    container_name: apm-server
    command: ["--strict.perms=false", "-e"]
    depends_on:
      - elasticsearch
      - kibana
    volumes:
      - ./elastic/apm-server.yml:/usr/share/apm-server/apm-server.yml:ro
    ports:
      - "8200:8200"
    networks:
      - observability

  metricbeat:
    image: docker.elastic.co/beats/metricbeat:${ELASTIC_VERSION:-7.9.3}
    container_name: metricbeat-observability
    user: root
    command: ["--strict.perms=false", "-e"]
    depends_on:
      - elasticsearch
      - kibana
    environment:
      - ELASTICSEARCH_HOST=http://elasticsearch:9200
      - KIBANA_HOST=http://kibana:5601
    volumes:
      - ./elastic/metricbeat/metricbeat-observability.yml:/usr/share/metricbeat/metricbeat.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /sys/fs/cgroup:/hostfs/sys/fs/cgroup:ro
      - /proc:/hostfs/proc:ro
      - /:/hostfs:ro
    networks:
      - observability

volumes:
  esdata:

networks:
  observability:
    driver: bridge
